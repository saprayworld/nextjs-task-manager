<!-- New Task Modal (Dialog) Component -->
<div id="new-task-modal" class="hidden fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4 opacity-0 transition-opacity duration-200">
    <!-- Modal Content -->
    <div class="bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl shadow-xl w-full max-w-lg overflow-hidden transform scale-95 transition-transform duration-200" id="new-task-content">
        <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center bg-slate-50/50 dark:bg-slate-900/50">
            <h2 class="text-lg font-semibold tracking-tight">สร้างงานใหม่</h2>
            <button id="btn-close-modal" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors p-1 rounded-md hover:bg-slate-200 dark:hover:bg-slate-800">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        
        <form id="new-task-form" class="p-6 space-y-5">
            <!-- Title -->
            <div class="space-y-1.5">
                <label for="task-title" class="text-sm font-medium">ชื่องาน <span class="text-red-500">*</span></label>
                <input type="text" id="task-title" required placeholder="เช่น อัปเดตโลโก้เว็บไซต์" class="w-full px-3 py-2 bg-transparent border border-slate-200 dark:border-slate-800 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent dark:text-slate-100 placeholder:text-slate-400 transition-shadow">
            </div>
            
            <!-- Category & Due Date Row -->
            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label for="task-category" class="text-sm font-medium">หมวดหมู่</label>
                    <select id="task-category" class="w-full px-3 py-2 bg-transparent border border-slate-200 dark:border-slate-800 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary dark:text-slate-100 [&>option]:text-slate-900 transition-shadow cursor-pointer">
                        <option value="design">Design</option>
                        <option value="development">Development</option>
                        <option value="research">Research</option>
                        <option value="marketing">Marketing</option>
                    </select>
                </div>
                <div class="space-y-1.5">
                    <label for="task-date" class="text-sm font-medium">วันกำหนดส่ง</label>
                    <input type="date" id="task-date" class="w-full px-3 py-2 bg-transparent border border-slate-200 dark:border-slate-800 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary dark:text-slate-100 [color-scheme:light_dark] transition-shadow cursor-pointer">
                </div>
            </div>

            <!-- Description -->
            <div class="space-y-1.5">
                <label for="task-desc" class="text-sm font-medium">รายละเอียด</label>
                <textarea id="task-desc" rows="3" placeholder="เพิ่มรายละเอียดของงานนี้..." class="w-full px-3 py-2 bg-transparent border border-slate-200 dark:border-slate-800 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-primary dark:text-slate-100 placeholder:text-slate-400 resize-none transition-shadow"></textarea>
            </div>

            <!-- Submit Buttons -->
            <div class="pt-2 flex justify-end gap-3">
                <button type="button" id="btn-cancel-task" class="px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors">
                    ยกเลิก
                </button>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-primary hover:bg-primaryHover rounded-md shadow-sm transition-colors active:scale-95 flex items-center gap-2">
                    สร้างงาน
                </button>
            </div>
        </form>
    </div>
</div>
