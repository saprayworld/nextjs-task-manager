<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Calendar - shadcn/ui Style</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Tailwind Config for shadcn/ui feel -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        primaryHover: '#1d4ed8',
                        background: 'hsl(var(--background))',
                        foreground: 'hsl(var(--foreground))',
                    },
                    fontFamily: {
                        sans: ['Inter', 'Sarabun', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sarabun:wght@400;500;600&display=swap');

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 9999px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        
        /* Calendar cell hover effect */
        .calendar-cell:hover .add-task-btn {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 min-h-screen flex flex-col font-sans transition-colors duration-200 selection:bg-primary/30 relative">

    <!-- Top Navigation / Header -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md shrink-0 sticky top-0 z-10">
        <div class="flex items-center gap-4">
            <div class="p-2 bg-primary/10 text-primary rounded-lg">
                <i data-lucide="calendar-days" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-xl font-semibold tracking-tight">Project Calendar</h1>
                <p class="text-xs text-slate-500 dark:text-slate-400">มุมมองปฏิทินสำหรับจัดการตารางงาน</p>
            </div>
        </div>
        
        <div class="flex items-center gap-3">
            <!-- View Switcher -->
            <div class="hidden sm:flex items-center bg-slate-100 dark:bg-slate-900 p-1 rounded-md border border-slate-200 dark:border-slate-800">
                <button class="p-1.5 rounded text-slate-500 hover:text-slate-900 dark:hover:text-slate-100 transition-colors" title="Kanban View">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                </button>
                <button class="p-1.5 rounded text-slate-500 hover:text-slate-900 dark:hover:text-slate-100 transition-colors" title="List View">
                    <i data-lucide="list" class="w-4 h-4"></i>
                </button>
                <button class="p-1.5 rounded bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 shadow-sm transition-colors" title="Calendar View">
                    <i data-lucide="calendar" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="w-px h-6 bg-slate-200 dark:bg-slate-800 mx-1 hidden sm:block"></div>

            <!-- Dark Mode Toggle -->
            <button id="theme-toggle" class="p-2 text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-50 rounded-md hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="สลับโหมดสี">
                <i data-lucide="moon" id="theme-icon" class="w-5 h-5"></i>
            </button>
            
            <button class="flex items-center gap-2 bg-primary hover:bg-primaryHover text-white px-4 py-2 rounded-md text-sm font-medium transition-all shadow-sm active:scale-95">
                <i data-lucide="plus" class="w-4 h-4"></i>
                <span class="hidden sm:inline">สร้างงานใหม่</span>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 p-6 w-full max-w-7xl mx-auto flex flex-col gap-6 h-[calc(100vh-80px)]">
        
        <!-- Calendar Container -->
        <div class="bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm flex flex-col flex-1 overflow-hidden">
            
            <!-- Calendar Toolbar -->
            <div class="px-6 py-4 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 shrink-0">
                <div class="flex items-center gap-4">
                    <h2 class="text-xl font-semibold tracking-tight w-36">มีนาคม 2026</h2>
                    
                    <div class="flex items-center rounded-md border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 shadow-sm overflow-hidden">
                        <button class="p-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-50 transition-colors border-r border-slate-200 dark:border-slate-800">
                            <i data-lucide="chevron-left" class="w-4 h-4"></i>
                        </button>
                        <button class="px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-slate-50 transition-colors border-r border-slate-200 dark:border-slate-800">
                            วันนี้
                        </button>
                        <button class="p-2 text-slate-600 hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-50 transition-colors">
                            <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <!-- Filters -->
                <div class="flex items-center gap-3">
                    <select class="appearance-none pl-3 pr-8 py-1.5 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-md focus:ring-2 focus:ring-primary outline-none transition-shadow text-slate-700 dark:text-slate-200 cursor-pointer">
                        <option>หมวดหมู่ทั้งหมด</option>
                        <option>Design</option>
                        <option>Development</option>
                        <option>Research</option>
                    </select>
                </div>
            </div>

            <!-- Days Header -->
            <div class="grid grid-cols-7 gap-px bg-slate-200 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-800 shrink-0">
                <div class="bg-slate-50 dark:bg-slate-900/50 py-2.5 text-center text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">อา.</div>
                <div class="bg-slate-50 dark:bg-slate-900/50 py-2.5 text-center text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">จ.</div>
                <div class="bg-slate-50 dark:bg-slate-900/50 py-2.5 text-center text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">อ.</div>
                <div class="bg-slate-50 dark:bg-slate-900/50 py-2.5 text-center text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">พ.</div>
                <div class="bg-slate-50 dark:bg-slate-900/50 py-2.5 text-center text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">พฤ.</div>
                <div class="bg-slate-50 dark:bg-slate-900/50 py-2.5 text-center text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">ศ.</div>
                <div class="bg-slate-50 dark:bg-slate-900/50 py-2.5 text-center text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">ส.</div>
            </div>

            <!-- Calendar Grid -->
            <div class="grid grid-cols-7 grid-rows-5 gap-px bg-slate-200 dark:bg-slate-800 flex-1 overflow-y-auto">
                
                <!-- Row 1: Mar 1 - Mar 7 -->
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">1</span>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">2</span>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">3</span>
                    </div>
                    <!-- Task Item -->
                    <div class="px-2 py-1 mb-1 rounded-md text-xs font-medium bg-amber-50 text-amber-700 border border-amber-200/60 dark:bg-amber-900/30 dark:text-amber-400 dark:border-amber-800/50 truncate cursor-pointer hover:opacity-80 transition-opacity" title="Research: วิเคราะห์คู่แข่งในตลาด">
                        <span class="w-1.5 h-1.5 rounded-full bg-amber-500 inline-block mr-1"></span>วิเคราะห์คู่แข่ง
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">4</span>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">5</span>
                    </div>
                    <!-- Task Item (Done) -->
                    <div class="px-2 py-1 mb-1 rounded-md text-xs font-medium bg-slate-100 text-slate-500 border border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700 truncate cursor-pointer hover:opacity-80 transition-opacity line-through" title="Design: สร้าง Wireframe หน้าแรก">
                        สร้าง Wireframe
                    </div>
                </div>
                
                <!-- TODAY CELL (Mar 6) -->
                <div class="bg-blue-50/30 dark:bg-blue-900/10 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-blue-50/50 dark:hover:bg-blue-900/20">
                    <div class="flex justify-between items-start mb-1">
                        <!-- Active Day Highlight -->
                        <span class="bg-primary text-white text-sm font-semibold w-7 h-7 flex items-center justify-center rounded-full shadow-sm">6</span>
                        <button class="add-task-btn opacity-0 text-primary hover:bg-primary/10 p-1 rounded transition-all">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                    <!-- Task Item -->
                    <div class="px-2 py-1 mb-1 rounded-md text-xs font-medium bg-blue-50 text-blue-700 border border-blue-200/60 dark:bg-blue-900/30 dark:text-blue-400 dark:border-blue-800/50 truncate cursor-pointer hover:opacity-80 transition-opacity" title="Design: ออกแบบ UI หน้า About Us">
                        <span class="w-1.5 h-1.5 rounded-full bg-blue-500 inline-block mr-1"></span>ออกแบบ UI About Us
                    </div>
                </div>
                
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">7</span>
                    </div>
                </div>

                <!-- Row 2: Mar 8 - Mar 14 -->
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">8</span>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">9</span>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">10</span>
                    </div>
                    <!-- Spanning Task Start (Simulated with absolute/margin tricks in a real app, here we use separate items) -->
                    <div class="px-2 py-1 mb-1 rounded-md rounded-r-none text-xs font-medium bg-emerald-50 text-emerald-700 border-y border-l border-emerald-200/60 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800/50 truncate border-r-0">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 inline-block mr-1"></span>พัฒนาระบบ Drag & Drop
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">11</span>
                    </div>
                    <!-- Spanning Task Middle -->
                    <div class="px-2 py-1 mb-1 rounded-none text-xs font-medium bg-emerald-50 text-emerald-700 border-y border-emerald-200/60 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800/50 truncate text-transparent select-none border-x-0">
                        -
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">12</span>
                    </div>
                    <!-- Spanning Task End -->
                    <div class="px-2 py-1 mb-1 rounded-md rounded-l-none text-xs font-medium bg-emerald-50 text-emerald-700 border-y border-r border-emerald-200/60 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800/50 truncate border-l-0 text-transparent select-none relative">
                        <!-- Tiny deadline icon -->
                        <i data-lucide="flag" class="w-3 h-3 absolute right-2 top-1.5 text-emerald-600 dark:text-emerald-500"></i>
                        -
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">13</span>
                    </div>
                </div>
                <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">14</span>
                    </div>
                </div>

                <!-- Row 3: Mar 15 - Mar 21 (Empty) -->
                <script>
                    for(let i=15; i<=21; i++) {
                        document.write(`
                        <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">${i}</span>
                            </div>
                        </div>`);
                    }
                </script>

                <!-- Row 4: Mar 22 - Mar 28 (Empty) -->
                <script>
                    for(let i=22; i<=28; i++) {
                        document.write(`
                        <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">${i}</span>
                            </div>
                        </div>`);
                    }
                </script>

                <!-- Row 5: Mar 29 - Mar 31 & Next Month Padding -->
                <script>
                    for(let i=29; i<=31; i++) {
                        document.write(`
                        <div class="bg-white dark:bg-slate-950 p-1.5 min-h-[120px] calendar-cell group transition-colors hover:bg-slate-50 dark:hover:bg-slate-900/30">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-700 dark:text-slate-200">${i}</span>
                            </div>
                        </div>`);
                    }
                    // Next month padding (Apr 1 - Apr 4)
                    for(let i=1; i<=4; i++) {
                        document.write(`
                        <div class="bg-slate-50/50 dark:bg-slate-900/20 p-1.5 min-h-[120px] calendar-cell group">
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full text-slate-400 dark:text-slate-600">${i}</span>
                            </div>
                        </div>`);
                    }
                </script>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // -----------------------------
        // Dark Mode Toggle Logic
        // -----------------------------
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const html = document.documentElement;

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
            themeIcon.setAttribute('data-lucide', 'sun');
        } else {
            html.classList.remove('dark');
            themeIcon.setAttribute('data-lucide', 'moon');
        }
        lucide.createIcons();

        themeToggleBtn.addEventListener('click', () => {
            html.classList.toggle('dark');
            if(html.classList.contains('dark')) {
                themeIcon.setAttribute('data-lucide', 'sun');
                localStorage.theme = 'dark';
            } else {
                themeIcon.setAttribute('data-lucide', 'moon');
                localStorage.theme = 'light';
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
